# Rapper default configuration
# User config location: ~/.rapper/config.yaml

claude:
  # Default model (can be overridden with -m flag)
  model: "claude-sonnet-4-20250514"

safety:
  # Enable outbound guard for scheduled/autonomous tasks
  # When enabled, sends to non-whitelisted targets are blocked
  outbound_guard_enabled: true
  
  # Additional patterns to block in bash-runner (regex)
  bash_extra_blocked: []
  
  # Whitelist for outbound communications
  # Only applies to scheduled tasks (RAPPER_SCHEDULED=1)
  # Interactive sessions are unrestricted
  outbound_whitelist:
    # Discord channel IDs (numeric strings)
    discord:
      # - "1234567890123456789"
      # - "9876543210987654321"
    
    # Telegram chat IDs (can be negative for groups)
    telegram:
      # - "-1001234567890"
      # - "123456789"
    
    # Email addresses (case-insensitive)
    email:
      # - "user@example.com"
      # - "team@company.com"
    
    # Slack channel IDs or names
    slack:
      # - "#general"
      # - "C01234ABCDE"

    # HTTP hosts for API calls (scheduled tasks only)
    http:
      - "localhost:3456"     # Agent Board API
      - "127.0.0.1:3456"     # Agent Board API (alt)

tmux:
  # Default session name suffix (will become rapper-<name>)
  default_session_name: "default"

  # Idle timeout in minutes (0 = never)
  idle_timeout: 0

tasks:
  # Maximum number of concurrent background tasks
  max_concurrent_tasks: 5

progress_reporting:
  # Enable real-time progress reporting to Board comments
  enabled: true
  # Report progress every N tool calls
  report_every_n_tools: 5
  # Board API endpoint
  board_url: "http://localhost:3456"

agent_board:
  # Agent Board API configuration for daemon mode
  url: "http://localhost:3456"
  api_key: ""  # Optional API key for authentication
  agent_id: ""  # Agent ID (auto-generated if empty)
  poll_interval: 30  # Task polling interval in seconds
  webhook_port: 18789  # Local webhook port for task notifications

board_tools:
  # Native Kanban tools for Claude Code sessions
  enabled: true
  api_url: "http://localhost:3456"
  api_key: "sk-4429c0b2e53522a890b1c5ab6c0d1fcb"  # rapper-1 API key
  agent_id: ""  # Agent ID (auto-injected by daemon or CLI)

logging:
  enabled: true
  level: "info"
  # Log location: ~/.rapper/logs/
